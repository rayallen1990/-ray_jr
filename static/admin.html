<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray_jr 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .header { background: #1a1a2e; color: white; padding: 16px 30px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; }
        .nav { display: flex; gap: 20px; }
        .nav a { color: #aaa; text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 4px; }
        .nav a.active, .nav a:hover { color: white; background: rgba(255,255,255,0.1); }
        .main { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-card .label { font-size: 13px; color: #666; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #333; }
        .section { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        th { color: #666; font-weight: 500; background: #fafafa; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn-approve { background: #28a745; color: white; }
        .btn-reject { background: #dc3545; color: white; margin-left: 6px; }
        .btn-approve:hover { background: #218838; }
        .btn-reject:hover { background: #c82333; }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: #667eea; }
        .upload-area input { display: none; }
        .empty { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Ray_jr 管理后台</h1>
        <div class="nav">
            <a href="/static/test.html">对话测试</a>
            <a href="/static/admin.html" class="active">管理后台</a>
            <a href="/api/docs">API 文档</a>
        </div>
    </div>

    <div class="main">
        <div class="stats">
            <div class="stat-card"><div class="label">已上传文档</div><div class="value" id="totalDocs">0</div></div>
            <div class="stat-card"><div class="label">待审核</div><div class="value" id="pendingDocs">0</div></div>
            <div class="stat-card"><div class="label">已通过</div><div class="value" id="approvedDocs">0</div></div>
            <div class="stat-card"><div class="label">已拒绝</div><div class="value" id="rejectedDocs">0</div></div>
        </div>
<!-- PLACEHOLDER_CONTINUE -->

        <div class="section">
            <div class="section-title">上传文档</div>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".pdf,.docx,.doc,.txt" onchange="uploadFile(this)" />
                <p>点击或拖拽文件到此处上传</p>
                <p style="font-size:12px;color:#999;margin-top:8px">支持 PDF、Word、TXT 格式，最大 100MB</p>
            </div>
        </div>

        <div class="section">
            <div class="section-title">文档列表</div>
            <table>
                <thead>
                    <tr><th>文件名</th><th>大小</th><th>上传时间</th><th>状态</th><th>操作</th></tr>
                </thead>
                <tbody id="docTable">
                    <tr><td colspan="5" class="empty">暂无文档</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api/v1/documents';

        async function loadDocuments() {
            try {
                const res = await fetch(`${API}/list`);
                const docs = await res.json();
                updateStats(docs);
                renderTable(docs);
            } catch (err) {
                console.error('Failed to load documents:', err);
            }
        }

        function updateStats(docs) {
            document.getElementById('totalDocs').textContent = docs.length;
            document.getElementById('pendingDocs').textContent = docs.filter(d => d.status === 'pending').length;
            document.getElementById('approvedDocs').textContent = docs.filter(d => d.status === 'approved').length;
            document.getElementById('rejectedDocs').textContent = docs.filter(d => d.status === 'rejected').length;
        }

        function renderTable(docs) {
            const tbody = document.getElementById('docTable');
            if (docs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无文档</td></tr>';
                return;
            }
            tbody.innerHTML = docs.map(doc => `
                <tr>
                    <td>${doc.file_name}</td>
                    <td>${doc.file_size}</td>
                    <td>${new Date(doc.created_at).toLocaleString('zh-CN')}</td>
                    <td><span class="badge badge-${doc.status}">${statusText(doc.status)}</span></td>
                    <td>
                        ${doc.status === 'pending' ? `
                            <button class="btn btn-approve" onclick="reviewDoc('${doc.id}', 'approve')">通过</button>
                            <button class="btn btn-reject" onclick="reviewDoc('${doc.id}', 'reject')">拒绝</button>
                        ` : '-'}
                    </td>
                </tr>
            `).join('');
        }

        function statusText(s) {
            return { pending: '待审核', approved: '已通过', rejected: '已拒绝', indexed: '已入库' }[s] || s;
        }

        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch(`${API}/upload?tenant_id=test-tenant&uploader_id=admin`, {
                    method: 'POST', body: formData
                });
                if (res.ok) { loadDocuments(); }
                else { const err = await res.json(); alert(err.detail); }
            } catch (err) { alert('上传失败: ' + err.message); }
            input.value = '';
        }

        async function reviewDoc(id, action) {
            try {
                await fetch(`${API}/${id}/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reviewed_by: 'admin', comment: '' })
                });
                loadDocuments();
            } catch (err) { alert('操作失败: ' + err.message); }
        }

        loadDocuments();
    </script>
</body>
</html>
